<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mercado Quindos - Comunidad IEQ</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome para Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #F8F9FB;
            -webkit-tap-highlight-color: transparent;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up { animation: slideUpFade 0.4s ease-out forwards; }
        
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .animate-pulse-soft { animation: pulse-soft 2s infinite; }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        quindos: {
                            yellow: '#FFC107',
                            navy: '#0F172A',
                            green: '#10B981',
                            light: '#F8FAFC'
                        }
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.08)',
                    }
                }
            }
        }
    </script>
</head>
<body class="text-slate-800 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- DATOS DE PRUEBA ---
        const CATEGORIAS_MERCADO = ['Todos', 'Alimentos', 'Cursos', 'Artesanías', 'Servicios', 'Segunda Mano'];

        const PRODUCTOS = [
            { id: 1, tipo_item: 'producto', nombre: "Café Especial Los Quindos (250g)", precio: 15000, imagen: "https://images.unsplash.com/photo-1559056199-641a0ac8b55e?w=500&q=80", vendedor: "Grado 11 - Emprendimiento", isFull: true, cat: 'Alimentos', desc: "Café de alta montaña cultivado y tostado por estudiantes del énfasis agrícola. Notas a chocolate y caramelo.", caracteristicas: ["Origen: Armenia, Quindío", "Tueste: Medio", "Variedad: Castillo"] },
            { id: 2, tipo_item: 'producto', nombre: "Miel de Abejas Orgánica (500ml)", precio: 18000, imagen: "https://images.unsplash.com/photo-1587049352846-4a222e784d38?w=500&q=80", vendedor: "Grado 9 - Proyecto Ambiental", isFull: true, cat: 'Alimentos', desc: "Miel 100% pura recolectada responsablemente del sendero ecológico de la institución.", caracteristicas: ["Pura 100%", "Multifloral", "Envase de vidrio retornable"] },
            { id: 3, tipo_item: 'producto', nombre: "Masterclass: IA en el Aula", precio: 25000, imagen: "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=500&q=80", vendedor: "Semillero Tech", isFull: false, cat: 'Cursos', desc: "Aprende a utilizar herramientas de Inteligencia Artificial para potenciar tus métodos de estudio y proyectos.", caracteristicas: ["Certificado incluido", "Material Digital", "Duración: 4 horas"] },
            { id: 4, tipo_item: 'producto', nombre: "Empanadas Congeladas (x10)", precio: 12000, imagen: "https://images.unsplash.com/photo-1626074961596-caa8ba9d6083?w=500&q=80", vendedor: "Familia García (Padres)", isFull: false, cat: 'Alimentos', desc: "Deliciosas empanadas caseras listas para freír. Apoya la economía de las familias de la institución.", caracteristicas: ["Receta familiar", "Relleno abundante", "Empaque ecológico"] },
            { id: 5, tipo_item: 'producto', nombre: "Mantenimiento de Bicicletas", precio: 20000, imagen: "https://images.unsplash.com/photo-1511994298241-608e28f14fde?w=500&q=80", vendedor: "Taller Don José (Comunidad)", isFull: false, cat: 'Servicios', desc: "Servicio técnico para bicicletas. Taller ubicado a dos cuadras del colegio, vecino del sector.", caracteristicas: ["10 años de experiencia", "Descuento a estudiantes", "Ajuste de frenos y cambios"] }
        ];

        const PROYECTOS = [
            { id: 'p1', tipo_item: 'proyecto', titulo: "Huerta Escolar 2026", meta: 1200000, recaudado: 850000, imagen: "https://images.unsplash.com/photo-1592419044706-39796d40f98c?w=800&q=80", vendedor: "Primaria & Ciencias", desc: "Buscamos fondos para ampliar nuestra huerta escolar, comprar semillas nativas, abono orgánico y herramientas para que los niños de primaria aprendan sobre soberanía alimentaria." },
            { id: 'p2', tipo_item: 'proyecto', titulo: "Robótica Inclusiva", meta: 2500000, recaudado: 600000, imagen: "https://images.unsplash.com/photo-1561557944-6e7860d1a7eb?w=800&q=80", vendedor: "Grado 10", desc: "Creación de kits de robótica de bajo costo utilizando material reciclado para enseñar programación básica a estudiantes de grados inferiores." }
        ];

        const GRUPOS = [
            { id: 'g1', tipo_item: 'grupo', titulo: "Club de Programación IEQ", miembros: 34, cat: "Académico", imagen: "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=500&q=80", vendedor: "Docente de Informática", desc: "Grupo enfocado en aprender desarrollo web, Python y crear soluciones tecnológicas para el colegio.", caracteristicas: ["Reuniones: Jueves 3:00 PM", "Nivel: Principiante a Intermedio", "Cupos disponibles"] },
            { id: 'g2', tipo_item: 'grupo', titulo: "Voluntariado Ambiental 'Hoja Verde'", miembros: 120, cat: "Comunitario", imagen: "https://images.unsplash.com/photo-1555240936-ce4049e6f8aa?w=500&q=80", vendedor: "Comité Ambiental", desc: "Únete a las jornadas de mantenimiento del sendero ecológico, reciclaje y siembra de árboles.", caracteristicas: ["Reuniones: Sábados 8:00 AM", "Certifica horas sociales", "Para todas las edades"] },
            { id: 'g3', tipo_item: 'grupo', titulo: "Preparación ICFES 2026", miembros: 85, cat: "Estudio", imagen: "https://images.unsplash.com/photo-1434030216411-0b793f4b4173?w=500&q=80", vendedor: "Grado 11", desc: "Círculo de estudio intensivo para las pruebas Saber 11. Resolvemos simulacros y repasamos temas clave.", caracteristicas: ["Reuniones: Lunes y Miércoles 4:00 PM", "Enfoque: Lectura Crítica y Matemáticas"] }
        ];

        const EMPLEOS = [
            { id: 'e1', tipo_item: 'empleo', titulo: "Tutor de Matemáticas Básicas", empresa: "Familia Pérez (Padres de Familia)", tipo: "Medio Tiempo", pago: "$20.000 / hora", imagen: "https://images.unsplash.com/photo-1509062522246-3755977927d7?w=500&q=80", vendedor: "Comunidad", desc: "Se busca estudiante de grado 10 u 11 con buen rendimiento académico para dar tutorías a niño de grado 4° dos veces por semana.", caracteristicas: ["Horario flexible", "Lugar: Cerca al colegio", "Requiere paciencia y empatía"] },
            { id: 'e2', tipo_item: 'empleo', titulo: "Practicante de Sistemas / Redes", empresa: "Tech Armenia S.A.S.", tipo: "Práctica", pago: "Auxilio de transporte", imagen: "https://images.unsplash.com/photo-1518770660439-4636190af475?w=500&q=80", vendedor: "Bolsa Externa", desc: "Oportunidad para estudiantes de técnica en sistemas o egresados. Apoyo en mantenimiento de redes y equipos de cómputo.", caracteristicas: ["Lunes a Viernes (Mañanas)", "Posibilidad de contratación futura", "Aplica convenio SENA"] },
            { id: 'e3', tipo_item: 'empleo', titulo: "Cuidado de Mascotas", empresa: "Residente Barrio Los Quindos", tipo: "Por Horas", pago: "$15.000 / paseo", imagen: "https://images.unsplash.com/photo-1544568100-847a948585b9?w=500&q=80", vendedor: "Comunidad", desc: "Necesito alguien responsable para pasear a mis dos perros pequeños los fines de semana en las tardes.", caracteristicas: ["Sábados y Domingos", "Solo sector aledaño"] }
        ];

        // --- COMPONENTES AUXILIARES ---
        const ProgressBar = ({ current, total }) => {
            const percent = Math.min((current / total) * 100, 100);
            return (
                <div className="w-full">
                    <div className="flex justify-between text-xs font-bold text-slate-500 mb-2">
                        <span className="text-quindos-navy">${current.toLocaleString()}</span>
                        <span>Meta: ${total.toLocaleString()}</span>
                    </div>
                    <div className="h-3 bg-slate-100 rounded-full overflow-hidden shadow-inner">
                        <div className="h-full bg-gradient-to-r from-quindos-green to-emerald-400 transition-all duration-1000 ease-out" style={{ width: `${percent}%` }} />
                    </div>
                    <p className="text-right text-[10px] text-slate-400 mt-1 font-medium">{Math.round(percent)}% completado</p>
                </div>
            );
        };

        const Toast = ({ message }) => {
            if (!message) return null;
            return (
                <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-[250] animate-slide-up">
                    <div className="bg-quindos-navy text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 border border-slate-700/50">
                        <i className="fa-solid fa-circle-check text-quindos-green"></i>
                        <span className="text-sm font-medium">{message}</span>
                    </div>
                </div>
            );
        };

        // --- COMPONENTE PRINCIPAL ---
        const App = () => {
            // Navegación
            const [tab, setTab] = useState('mercado');
            
            // Estado de Usuario & Auth
            const [user, setUser] = useState(null); // null si no está logueado
            const [authModal, setAuthModal] = useState(false);
            const [authMode, setAuthMode] = useState('login'); // 'login' | 'register'
            const [authRole, setAuthRole] = useState('Estudiante'); // Estado para campos dinámicos
            
            // Carrito
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            
            // Detalles Modals
            const [selectedItem, setSelectedItem] = useState(null);
            
            // Filtros Mercado
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('Todos');
            
            // UI States
            const [chatMsg, setChatMsg] = useState('');
            const [chatHistory, setChatHistory] = useState([]);
            const [toastMsg, setToastMsg] = useState(null);
            const [isCheckingOut, setIsCheckingOut] = useState(false);
            
            const chatEndRef = useRef(null);

            useEffect(() => {
                if (chatEndRef.current) {
                    chatEndRef.current.scrollIntoView({ behavior: "smooth" });
                }
            }, [chatHistory]);

            const filteredProductos = useMemo(() => {
                return PRODUCTOS.filter(p => {
                    const matchCat = selectedCategory === 'Todos' || p.cat === selectedCategory;
                    const matchSearch = p.nombre.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                        p.vendedor.toLowerCase().includes(searchTerm.toLowerCase());
                    return matchCat && matchSearch;
                });
            }, [searchTerm, selectedCategory]);

            const showToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(null), 3500);
            };

            const handleAuth = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const nombre = formData.get('nombre') || formData.get('email').split('@')[0];
                
                setUser({ 
                    nombre: nombre, 
                    email: formData.get('email'),
                    rol: formData.get('rol') || 'Estudiante'
                });
                
                setAuthModal(false);
                showToast(`¡Bienvenido/a, ${nombre}!`);
            };

            const logout = () => {
                setUser(null);
                showToast("Sesión cerrada correctamente.");
            };

            const addToCart = (item) => {
                setCart(prev => [...prev, { ...item, cartId: Date.now() }]);
                showToast(`¡${item.nombre.split(' ')[0]} añadido al pedido!`);
            };

            const removeFromCart = (id) => setCart(cart.filter(i => i.cartId !== id));
            const total = cart.reduce((acc, i) => acc + (i.precio || 0), 0);

            const handleCheckout = () => {
                if(!user) {
                    setIsCartOpen(false);
                    setAuthModal(true);
                    showToast("Por favor, inicia sesión para continuar.");
                    return;
                }
                setIsCheckingOut(true);
                setTimeout(() => {
                    setIsCheckingOut(false);
                    setCart([]);
                    setIsCartOpen(false);
                    showToast("¡Solicitud confirmada! El vendedor se comunicará contigo.");
                }, 1500);
            };

            const handleActionClick = (item, action) => {
                if(!user && action !== 'aportar') {
                    setSelectedItem(null);
                    setAuthModal(true);
                    showToast("Regístrate o inicia sesión para esta acción.");
                    return;
                }

                if(action === 'unirse') {
                    showToast(`¡Te has unido al grupo ${item.titulo}! Te contactaremos pronto.`);
                    setSelectedItem(null);
                } else if(action === 'aplicar') {
                    showToast(`¡Postulación enviada a ${item.empresa}!`);
                    setSelectedItem(null);
                } else if(action === 'donar') {
                    showToast(`¡Gracias por tu intención de donar a ${item.titulo}! Te enviaremos los medios de pago.`);
                    setSelectedItem(null);
                }
            };

            const sendMsg = () => {
                if(!chatMsg.trim()) return;
                if(!user) {
                    setAuthModal(true);
                    return;
                }
                const newMsg = chatMsg.trim();
                setChatHistory(prev => [...prev, { text: newMsg, sender: 'user' }]);
                setChatMsg('');
                
                setTimeout(() => {
                    let reply = "Gracias por tu mensaje. Te responderemos lo antes posible.";
                    setChatHistory(prev => [...prev, { text: reply, sender: 'admin' }]);
                }, 1000);
            };

            const handleOpenDetails = (item) => {
                setSelectedItem(item);
                setChatHistory([{ text: "¡Hola! ¿Tienes alguna duda sobre esto?", sender: 'admin' }]);
            };

            return (
                <div className="min-h-screen pb-24 flex flex-col font-sans">
                    {/* NAV SUPERIOR */}
                    <nav className="glass sticky top-0 z-40 border-b border-slate-200/50 shadow-sm transition-all">
                        <div className="bg-quindos-yellow h-2 w-full"></div>
                        <div className="max-w-6xl mx-auto px-4 py-3">
                            <div className="flex items-center justify-between gap-4">
                                {/* Logo */}
                                <div className="flex items-center gap-3 cursor-pointer" onClick={() => setTab('mercado')}>
                                    <div className="bg-white p-1.5 rounded-xl shadow-sm border border-slate-100">
                                        <img src="https://i.postimg.cc/9fJsDW4Z/escudo.png" className="h-8 md:h-10 object-contain" alt="Escudo IEQ" />
                                    </div>
                                    <div>
                                        <h1 className="font-black text-quindos-navy text-lg md:text-xl tracking-tight leading-none">Mercado Quindos</h1>
                                        <p className="text-[10px] md:text-xs font-bold text-slate-500 uppercase tracking-widest hidden sm:block">Comunidad I.E. Los Quindos</p>
                                    </div>
                                </div>

                                {/* Acciones (Auth & Cart) */}
                                <div className="flex items-center gap-3">
                                    {user ? (
                                        <div className="group relative">
                                            <button className="flex items-center gap-2 bg-slate-100 hover:bg-slate-200 px-3 md:px-4 py-2 rounded-full transition-colors">
                                                <i className="fa-solid fa-circle-user text-quindos-green text-lg"></i>
                                                <span className="text-xs font-bold text-quindos-navy hidden sm:block">{user.nombre}</span>
                                            </button>
                                            {/* Dropdown Logout */}
                                            <div className="absolute right-0 mt-2 w-32 bg-white rounded-xl shadow-lg border border-slate-100 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all">
                                                <button onClick={logout} className="w-full text-left px-4 py-2 text-xs font-bold text-red-500 hover:bg-red-50 rounded-xl">Cerrar Sesión</button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="hidden sm:flex items-center gap-2">
                                            <button onClick={() => { setAuthMode('login'); setAuthModal(true); }} className="text-xs font-bold text-slate-600 hover:text-quindos-navy px-3 py-2 transition">
                                                Ingresar
                                            </button>
                                            <button onClick={() => { setAuthMode('register'); setAuthModal(true); }} className="text-xs font-bold bg-quindos-navy text-white px-4 py-2 rounded-full hover:bg-slate-800 transition shadow-sm">
                                                Registrarse
                                            </button>
                                        </div>
                                    )}

                                    <button onClick={() => setIsCartOpen(true)} className="relative p-3 bg-slate-100 hover:bg-slate-200 rounded-full transition-colors text-quindos-navy flex items-center justify-center">
                                        <i className="fa-solid fa-bag-shopping text-lg"></i>
                                        {cart.length > 0 && (
                                            <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center shadow-sm animate-pulse-soft">
                                                {cart.length}
                                            </span>
                                        )}
                                    </button>
                                </div>
                            </div>

                            {/* Pestañas de Navegación */}
                            <div className="flex gap-2 mt-4 overflow-x-auto no-scrollbar pb-1">
                                {[
                                    { id: 'mercado', label: 'Mercado Comunitario', icon: 'fa-store' },
                                    { id: 'banco', label: 'Proyectos & Donaciones', icon: 'fa-hand-holding-dollar' },
                                    { id: 'comunidad', label: 'Comunidad & Grupos', icon: 'fa-users' },
                                    { id: 'empleo', label: 'Bolsa de Empleo', icon: 'fa-briefcase' },
                                    { id: 'info', label: 'Institución', icon: 'fa-award' }
                                ].map(m => (
                                    <button 
                                        key={m.id} 
                                        onClick={() => setTab(m.id)} 
                                        className={`flex items-center gap-2 px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all duration-300 flex-shrink-0 ${
                                            tab === m.id 
                                            ? 'bg-quindos-navy text-white shadow-md' 
                                            : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50'
                                        }`}
                                    >
                                        <i className={`fa-solid ${m.icon}`}></i> {m.label}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </nav>

                    {/* MAIN CONTENT */}
                    <main className="flex-grow max-w-6xl mx-auto w-full px-4 py-6 md:py-8 flex flex-col gap-6">
                        
                        {/* VIEW: TIENDA */}
                        {tab === 'mercado' && (
                            <div className="animate-slide-up flex flex-col gap-6">
                                <div className="relative rounded-3xl overflow-hidden bg-quindos-navy text-white p-6 md:p-10 shadow-soft">
                                    <div className="absolute inset-0 opacity-20 bg-[url('https://images.unsplash.com/photo-1577896851231-70ef18881754?q=80&w=1000')] bg-cover bg-center mix-blend-overlay"></div>
                                    <div className="relative z-10 max-w-xl">
                                        <span className="bg-quindos-yellow text-quindos-navy text-[10px] font-black px-2 py-1 rounded uppercase tracking-widest mb-3 inline-block">Mercado Local Virtual</span>
                                        <h2 className="text-2xl md:text-4xl font-black mb-2 leading-tight">El Mercado de Nuestra Comunidad</h2>
                                        <p className="text-slate-300 text-sm md:text-base font-medium">Estudiantes, padres, docentes y vecinos unidos. Compra, vende y apoya la economía local.</p>
                                    </div>
                                </div>

                                <div className="flex flex-col md:flex-row justify-between gap-4 sticky top-36 z-30 bg-[#F8F9FB] py-2">
                                    <div className="relative flex-grow max-w-md">
                                        <i className="fa-solid fa-magnifying-glass absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                                        <input 
                                            type="text" 
                                            placeholder="Buscar productos..." 
                                            value={searchTerm}
                                            onChange={(e) => setSearchTerm(e.target.value)}
                                            className="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-quindos-yellow shadow-sm"
                                        />
                                    </div>
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                                        {CATEGORIAS_MERCADO.map(cat => (
                                            <button 
                                                key={cat} 
                                                onClick={() => setSelectedCategory(cat)}
                                                className={`px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap transition-all border ${
                                                    selectedCategory === cat 
                                                    ? 'bg-quindos-yellow text-quindos-navy border-transparent' 
                                                    : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'
                                                }`}
                                            >
                                                {cat}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
                                    {filteredProductos.map(p => (
                                        <div key={p.id} onClick={() => handleOpenDetails(p)} className="bg-white rounded-3xl shadow-sm hover:shadow-soft border border-slate-100 overflow-hidden cursor-pointer group transition-all duration-300 flex flex-col">
                                            <div className="aspect-square relative overflow-hidden bg-slate-50">
                                                <img src={p.imagen} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy" />
                                                <div className="absolute top-3 left-3 flex flex-col gap-1">
                                                    {p.isFull && <span className="bg-quindos-navy text-white text-[9px] font-black px-2 py-1 rounded-md uppercase tracking-wider flex items-center gap-1 shadow-md"><i className="fa-solid fa-bolt text-quindos-yellow"></i> Envío IEQ</span>}
                                                    <span className="bg-white/90 backdrop-blur text-slate-700 text-[9px] font-bold px-2 py-1 rounded-md uppercase shadow-sm border border-white/50">{p.cat}</span>
                                                </div>
                                            </div>
                                            <div className="p-4 md:p-5 flex flex-col flex-grow">
                                                <p className="text-[10px] font-bold text-quindos-green uppercase mb-1 tracking-wide">{p.vendedor}</p>
                                                <h3 className="text-sm font-bold text-slate-800 leading-snug mb-2 flex-grow line-clamp-2">{p.nombre}</h3>
                                                <div className="flex items-center justify-between mt-auto pt-3 border-t border-slate-100">
                                                    <span className="font-black text-lg text-quindos-navy">${p.precio.toLocaleString()}</span>
                                                    <button onClick={(e) => { e.stopPropagation(); addToCart(p); }} className="w-8 h-8 bg-slate-100 hover:bg-quindos-yellow hover:text-quindos-navy rounded-full text-slate-600 flex items-center justify-center transition-colors">
                                                        <i className="fa-solid fa-plus"></i>
                                                    </button>
                                                </div>
                                            </div>

                                                <div className={`p-3 rounded-2xl text-sm max-w-[85%] shadow-sm ${
                                                    m.sender === 'user' 
                                                    ? 'bg-quindos-navy text-white rounded-tr-sm' 
                                                    : 'bg-white text-slate-700 rounded-tl-sm border border-slate-100'
                                                }`}>
                                                    {m.text}
                                                </div>
                                            </div>
                                        ))}
                                        <div ref={chatEndRef} />
                                    </div>
                                    
                                    <div className="p-4 bg-white border-t border-slate-100">
                                        <div className="flex gap-2">
                                            <input 
                                                type="text" 
                                                value={chatMsg} 
                                                onChange={(e) => setChatMsg(e.target.value)} 
                                                onKeyPress={(e) => e.key === 'Enter' && sendMsg()}
                                                placeholder={user ? "Haz una pregunta..." : "Inicia sesión para enviar mensajes"} 
                                                disabled={!user}
                                                className="flex-grow bg-slate-50 border border-slate-200 rounded-xl px-4 text-sm focus:outline-none focus:ring-2 focus:ring-quindos-navy/20 transition-all disabled:opacity-60" 
                                            />
                                            <button 
                                                onClick={sendMsg} 
                                                disabled={!chatMsg.trim() || !user}
                                                className="bg-quindos-yellow disabled:opacity-50 text-quindos-navy w-12 h-12 rounded-xl flex items-center justify-center shadow-sm hover:shadow-md transition-all flex-shrink-0"
                                            >
                                                <i className="fa-solid fa-paper-plane"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* CARRITO LATERAL */}
                    {isCartOpen && (
                        <div className="fixed inset-0 z-[110] flex justify-end">
                            <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={() => setIsCartOpen(false)}></div>
                            <div className="relative bg-white w-full max-w-md h-full shadow-2xl flex flex-col animate-slide-up md:animate-none">
                                <div className="p-6 bg-white border-b border-slate-100 flex justify-between items-center z-10">
                                    <div className="flex items-center gap-3">
                                        <div className="p-2 bg-quindos-yellow/20 rounded-xl text-quindos-navy">
                                            <i className="fa-solid fa-bag-shopping text-xl"></i>
                                        </div>
                                        <h2 className="text-xl font-black text-slate-800">Tu Pedido</h2>
                                    </div>
                                    <button onClick={() => setIsCartOpen(false)} className="bg-slate-100 w-8 h-8 rounded-full flex items-center justify-center text-slate-500 hover:bg-slate-200">
                                        <i className="fa-solid fa-xmark"></i>
                                    </button>
                                </div>
                                
                                <div className="flex-grow overflow-y-auto p-4 space-y-3 bg-[#F8F9FB]">
                                    {cart.length === 0 ? (
                                        <div className="h-full flex flex-col items-center justify-center text-center px-6">
                                            <div className="w-24 h-24 bg-slate-100 rounded-full flex items-center justify-center mb-4">
                                                <i className="fa-solid fa-bag-shopping text-4xl text-slate-300"></i>
                                            </div>
                                            <h3 className="font-bold text-slate-700 text-lg mb-1">Tu carrito está vacío</h3>
                                            <p className="text-sm text-slate-500">Agrega productos para verlos aquí.</p>
                                        </div>
                                    ) : (
                                        cart.map(item => (
                                            <div key={item.cartId} className="flex gap-4 p-3 bg-white rounded-2xl border border-slate-100 shadow-sm items-center">
                                                <img src={item.imagen} className="w-16 h-16 rounded-xl object-cover bg-slate-50" alt={item.nombre} />
                                                <div className="flex-grow min-w-0">
                                                    <h4 className="text-xs font-bold text-slate-800 leading-tight truncate mb-1">{item.nombre}</h4>
                                                    <p className="text-[10px] text-slate-500 truncate mb-1">{item.vendedor}</p>
                                                    <p className="text-sm font-black text-quindos-navy">${item.precio?.toLocaleString()}</p>
                                                </div>
                                                <button onClick={() => removeFromCart(item.cartId)} className="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-full transition-colors flex-shrink-0">
                                                    <i className="fa-solid fa-trash"></i>
                                                </button>
                                            </div>
                                        ))
                                    )}
                                </div>
                                
                                {cart.length > 0 && (
                                    <div className="p-6 bg-white border-t border-slate-100 shadow-[0_-10px_20px_-10px_rgba(0,0,0,0.05)] z-10">
                                        <div className="space-y-2 mb-4">
                                            <div className="flex justify-between text-sm text-slate-500">
                                                <span>Subtotal ({cart.length} items)</span>
                                                <span>${total.toLocaleString()}</span>
                                            </div>
                                            <div className="h-px bg-slate-100 w-full my-2"></div>
                                            <div className="flex justify-between items-end">
                                                <span className="text-sm font-bold text-slate-800">Total a pagar</span>
                                                <span className="text-2xl font-black text-quindos-navy">${total.toLocaleString()}</span>
                                            </div>
                                        </div>
                                        
                                        <button 
                                            onClick={handleCheckout}
                                            disabled={isCheckingOut}
                                            className="w-full bg-quindos-navy text-white py-4 rounded-2xl font-bold uppercase text-sm tracking-wide flex items-center justify-center gap-2 shadow-lg hover:bg-slate-800 transition-all disabled:opacity-70"
                                        >
                                            {isCheckingOut ? (
                                                <span className="flex items-center gap-2">
                                                    <i className="fa-solid fa-circle-notch fa-spin"></i> Procesando...
                                                </span>
                                            ) : (
                                                <>Confirmar Solicitud <i className="fa-solid fa-arrow-right"></i></>
                                            )}
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                    
                    {/* FOOTER */}
                    <footer className="mt-auto max-w-6xl mx-auto w-full px-4 text-center py-8">
                        <div className="w-16 h-1 bg-slate-200 mx-auto rounded-full mb-4"></div>
                        <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">&copy; {new Date().getFullYear()} I.E. Los Quindos</p>
                        <p className="text-[10px] text-slate-400">Trabajo, Ciencia y Civilización</p>
                    </footer>

                    <Toast message={toastMsg} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
